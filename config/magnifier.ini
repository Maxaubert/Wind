; Wind magnifier config. Edit and save; changes apply within ~1s.
; Buttons: 1 = mouse XBUTTON1 (back), 2 = mouse XBUTTON2 (forward)
zoomInButton=2
zoomOutButton=1
recenterVk=0
maxLevel=8.0
fullRangeSeconds=1.2
sensitivity=1.0
tickHzCap=144
; diagnostics=1 logs frame timing to wind_diag.log (restart Wind to apply)
diagnostics=0
; updateMode: 0=skip sub-pixel, 1=emit on float-center, 2=continuous while zoomed
updateMode=0
; maxUpdateHz: 0=unlimited, else cap transform updates/sec
maxUpdateHz=0
