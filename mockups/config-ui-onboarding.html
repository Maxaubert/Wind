<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wind Config - first-launch onboarding</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 36px; background: #232328; color: #e9e9ee;
         font-family: "Segoe UI Variable","Segoe UI",system-ui,sans-serif; display: flex; flex-direction: column; align-items: center; }
  h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; align-self: flex-start; }
  .sub { color: #b9b9c4; margin: 0 0 22px; font-size: 12.5px; align-self: flex-start; max-width: 700px; line-height: 1.5; }

  .theme-dark {
    --bg:#0e0e12; --text:#f3f3f6; --muted:#85858f; --line:#242430; --hover:rgba(255,255,255,.07);
    --accent:#5b5bd6; --accent-icon:#9090f2; --accent-soft:rgba(91,91,214,.22);
    --track:rgba(255,255,255,.16); --winborder:rgba(255,255,255,.08); --shadow:0 24px 64px rgba(0,0,0,.7); --chip:rgba(255,255,255,.06);
  }
  .theme-light {
    --bg:#ffffff; --text:#1c1c22; --muted:#6c6c77; --line:#e7e7ec; --hover:rgba(0,0,0,.05);
    --accent:#5b5bd6; --accent-icon:#5b5bd6; --accent-soft:rgba(91,91,214,.13);
    --track:rgba(0,0,0,.14); --winborder:rgba(0,0,0,.1); --shadow:0 24px 64px rgba(0,0,0,.2); --chip:rgba(0,0,0,.04);
  }

  .win { width: 560px; height: 500px; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column;
         background: var(--bg); color: var(--text); border: 1px solid var(--winborder); box-shadow: var(--shadow); font-size: 13px; }

  .caption { height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding-left: 10px; }
  .iconbtn { width: 34px; height: 34px; border-radius: 9px; border: 0; background: transparent; color: var(--muted);
             display: grid; place-items: center; cursor: pointer; }
  .iconbtn:hover { background: var(--hover); color: var(--text); }
  .tbtns { display: flex; height: 100%; }
  .tbtn { width: 46px; height: 100%; display: grid; place-items: center; color: var(--muted); border: 0; background: transparent; cursor: pointer; }
  .tbtn:hover { background: var(--hover); color: var(--text); }
  .tbtn.close:hover { background: #e81123; color: #fff; }

  .wizbody { flex: 1; overflow: auto; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 8px 52px; }
  .step { display: none; width: 100%; max-width: 430px; }
  .step.show { display: block; }
  .step h2 { font-size: 27px; margin: 0 0 10px; font-weight: 600; letter-spacing: -.3px; }
  .step p { color: var(--muted); font-size: 13.5px; line-height: 1.55; margin: 0 0 24px; }
  .step.center { text-align: center; }
  .step.center p { max-width: 384px; margin-left: auto; margin-right: auto; }
  .bigglyph { width: 78px; height: 78px; border-radius: 20px; background: var(--accent-soft); color: var(--accent-icon);
              display: grid; place-items: center; margin: 0 auto 22px; }
  .bigring { width: 88px; height: 88px; margin: 0 auto 22px; }
  .ring { stroke-dasharray: 227; stroke-dashoffset: 227; transform: rotate(-90deg); transform-origin: 50% 50%; }
  .tick { stroke-dasharray: 44; stroke-dashoffset: 44; }
  @keyframes ringDraw { to { stroke-dashoffset: 0; } }
  @keyframes tickDraw { to { stroke-dashoffset: 0; } }
  .step.show .ring { animation: ringDraw .9s ease forwards; }
  .step.show .tick { animation: tickDraw .45s ease .6s forwards; }
  .tryhint { display: flex; align-items: center; gap: 8px; margin-top: 6px; padding: 9px 12px; border-radius: 8px;
             background: var(--accent-soft); color: var(--accent-icon); font-size: 12px; }
  .tryhint svg { flex-shrink: 0; }
  .step.center .tryhint { display: inline-flex; }
  /* welcome: wind trails flow, then the logo draws in and settles static */
  .hero { position: relative; width: 236px; height: 140px; margin: 0 auto 14px; display: grid; place-items: center; }
  .windsvg { position: absolute; inset: 0; width: 236px; height: 140px; color: var(--accent-icon); }
  .step.show .windsvg { animation: trailsOut .9s ease-out .85s forwards; }
  .wln { fill: none; stroke: url(#windgrad); stroke-linecap: round; stroke-dasharray: 26 200; }
  .wln.l1 { stroke-width: 2.6; animation: windTrail 3.2s linear infinite; }
  .wln.l2 { stroke-width: 2.2; animation: windTrail 4.2s linear .7s infinite; }
  .wln.l3 { stroke-width: 3;   animation: windTrail 3.6s linear 1.3s infinite; }
  .wln.l4 { stroke-width: 2;   animation: windTrail 4.7s linear .3s infinite; }
  .wln.l5 { stroke-width: 2.4; animation: windTrail 3.9s linear 1.9s infinite; }
  @keyframes windTrail { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -226; } }
  @keyframes trailsOut { to { opacity: 0; } }
  .logosvg { position: relative; z-index: 1; width: 84px; height: 84px; color: var(--accent-icon); opacity: 0; }
  .step.show .logosvg { animation: logoIn .6s ease-out .95s forwards; }
  @keyframes logoIn { from { opacity: 0; transform: scale(.94); } to { opacity: 1; transform: scale(1); } }
  .lp { fill: none; stroke: currentColor; stroke-width: 1.2; stroke-linecap: round; stroke-dasharray: 100; stroke-dashoffset: -100; }
  .step.show .lp { animation: logoDraw .8s ease-out forwards; }
  .step.show .lp:nth-child(1) { animation-delay: .95s; }
  .step.show .lp:nth-child(2) { animation-delay: 1.05s; }
  .step.show .lp:nth-child(3) { animation-delay: 1.15s; }
  @keyframes logoDraw { to { stroke-dashoffset: 0; } }

  .orow { display: flex; align-items: center; gap: 16px; padding: 15px 16px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 11px; }
  .orow > .ot { flex: 1; min-width: 0; }
  .rlabel { font-size: 13.5px; } .rdesc { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .rctl { flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
  .keycap { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line); background: var(--chip); font-size: 11.5px; color: var(--text); }
  .linkbtn { padding: 5px 11px; border-radius: 7px; border: 1px solid var(--line); background: transparent; font-size: 12px; color: var(--text); cursor: pointer; }
  .slider { display: flex; align-items: center; gap: 12px; width: 168px; }
  .track { position: relative; flex: 1; height: 4px; border-radius: 3px; background: var(--track); }
  .fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: var(--accent); }
  .knob { position: absolute; top: 50%; width: 13px; height: 13px; border-radius: 50%; background: #fff; transform: translate(-50%,-50%); box-shadow: 0 1px 3px rgba(0,0,0,.45); }
  .val { width: 40px; text-align: right; color: var(--muted); font-size: 12px; }
  .toggle { width: 38px; height: 21px; border-radius: 11px; border: 0; background: var(--track); position: relative; cursor: pointer; padding: 0; }
  .toggle .dot { position: absolute; top: 2px; left: 2px; width: 17px; height: 17px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .toggle.on { background: var(--accent); } .toggle.on .dot { left: 19px; }

  .wizdots { display: flex; justify-content: center; gap: 7px; padding: 4px 0 10px; }
  .wizdots i { width: 7px; height: 7px; border-radius: 50%; background: var(--track); transition: width .2s; }
  .wizdots i.on { width: 22px; border-radius: 4px; background: var(--accent); }

  .wizfoot { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 14px 24px; border-top: 1px solid var(--line); }
  .skip { margin-right: auto; background: transparent; border: 0; color: var(--muted); font-size: 12.5px; cursor: pointer; }
  .skip:hover { color: var(--text); }
  .btn { padding: 8px 20px; border-radius: 7px; border: 1px solid var(--line); background: transparent; color: var(--text); font-size: 12.5px; cursor: pointer; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn[hidden], .skip[hidden] { display: none; }
</style>
</head>
<body>
  <h1>Wind Config &mdash; first-launch onboarding</h1>
  <p class="sub">Full-page guided setup that auto-opens once on first launch (separate from Settings):
  welcome, set zoom keys, tune feel, done. Walk it with Back/Next; dots show progress. Sun/moon toggles
  theme. (Interactive mock.)</p>

  <div id="app"></div>

<script>
  const ic = {
    glyph: '<svg viewBox="0 0 16 16" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 5.5h8.5a2 2 0 1 0-2-2"/><path d="M2 9h11a2 2 0 1 1-2 2"/><path d="M2 12.5h6.5a1.7 1.7 0 1 1-1.7 1.7"/></svg>',
    glyphBig: '<svg viewBox="0 0 16 16" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 5.5h8.5a2 2 0 1 0-2-2"/><path d="M2 9h11a2 2 0 1 1-2 2"/><path d="M2 12.5h6.5a1.7 1.7 0 1 1-1.7 1.7"/></svg>',
    bulb: '<svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 12.6h4M6.6 14.3h2.8"/><path d="M8 1.6a4.2 4.2 0 0 0-2.6 7.5c.5.4.8 1 .8 1.6h3.6c0-.6.3-1.2.8-1.6A4.2 4.2 0 0 0 8 1.6z"/></svg>',
    sun: '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v1.6M8 13.4V15M1 8h1.6M13.4 8H15M3.05 3.05l1.1 1.1M11.85 11.85l1.1 1.1M12.95 3.05l-1.1 1.1M4.15 11.85l-1.1 1.1"/></svg>',
    moon: '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 9.5A5.5 5.5 0 1 1 6.5 2.5a4.3 4.3 0 0 0 7 7z"/></svg>',
    min: '<svg viewBox="0 0 11 11" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M1 5.5h9"/></svg>',
    close: '<svg viewBox="0 0 11 11" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M1.3 1.3 9.7 9.7M9.7 1.3 1.3 9.7"/></svg>',
  };
  const slider = (pct,val) => `<div class="slider"><div class="track"><div class="fill" style="width:${pct}%"></div><div class="knob" style="left:${pct}%"></div></div><span class="val">${val}</span></div>`;
  const toggle = (on) => `<button class="toggle${on?' on':''}" type="button"><span class="dot"></span></button>`;
  const orow = (label,desc,ctl) => `<div class="orow"><div class="ot"><div class="rlabel">${label}</div><div class="rdesc">${desc}</div></div><div class="rctl">${ctl}</div></div>`;

  const STEPS = [
    // 1. Welcome (trails flow, then logo draws in, then static)
    `<div class="step center">
      <div class="hero">
        <svg class="windsvg" viewBox="0 0 236 140" fill="none">
          <defs><linearGradient id="windgrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="currentColor" stop-opacity="0"/>
            <stop offset=".5" stop-color="currentColor" stop-opacity="1"/>
            <stop offset="1" stop-color="currentColor" stop-opacity="0"/>
          </linearGradient></defs>
          <path class="wln l1" pathLength="100" d="M246 34 C 178 8, 96 54, -10 30"/>
          <path class="wln l2" pathLength="100" d="M246 60 C 168 94, 82 32, -10 66"/>
          <path class="wln l3" pathLength="100" d="M246 80 C 188 60, 72 114, -10 86"/>
          <path class="wln l4" pathLength="100" d="M246 48 C 162 58, 62 40, -10 54"/>
          <path class="wln l5" pathLength="100" d="M246 108 C 172 130, 86 96, -10 112"/>
        </svg>
        <svg class="logosvg" viewBox="0 0 16 16" fill="none">
          <path class="lp" pathLength="100" d="M2 5.5h8.5a2 2 0 1 0-2-2"/>
          <path class="lp" pathLength="100" d="M2 9h11a2 2 0 1 1-2 2"/>
          <path class="lp" pathLength="100" d="M2 12.5h6.5a1.7 1.7 0 1 1-1.7 1.7"/>
        </svg>
      </div>
      <h2>Welcome to Wind</h2>
      <p>A fast magnifier that lives in your tray. Let's set up the essentials.</p></div>`,
    // 2. Set your zoom keys (applied on Next)
    `<div class="step"><h2>Set your zoom keys</h2>
      <p>Pick the buttons you'll hold to zoom. Mouse side-buttons work great, or choose keyboard keys.</p>
      ${orow('Zoom in','Hold to magnify', '<span class="keycap">Mouse button 5</span><button class="linkbtn">Rebind</button>')}
      ${orow('Zoom out','Hold to zoom back', '<span class="keycap">Mouse button 4</span><button class="linkbtn">Rebind</button>')}</div>`,
    // 3. You're all set (then launches into Settings)
    `<div class="step center">
      <div class="bigring"><svg viewBox="0 0 80 80" width="86" height="86">
        <circle class="ring" cx="40" cy="40" r="36" fill="none" stroke="var(--accent)" stroke-width="3"/>
        <path class="tick" d="M25 41l10 10 20-21" fill="none" stroke="var(--accent)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg></div>
      <h2>You're all set</h2></div>`,
  ];

  const dots = STEPS.map(() => '<i></i>').join('');
  const winHTML = `<div class="win theme-dark">
    <div class="caption"><button class="iconbtn" id="themeBtn" title="Toggle theme">${ic.sun}</button>
      <div class="tbtns"><button class="tbtn" title="Minimize">${ic.min}</button><button class="tbtn close" title="Close">${ic.close}</button></div></div>
    <div class="wizbody">${STEPS.join('')}</div>
    <div class="wizdots">${dots}</div>
    <div class="wizfoot"><button class="skip" id="skipBtn">Skip setup</button>
      <button class="btn" id="backBtn">Back</button>
      <button class="btn primary" id="nextBtn">Get started</button></div>
  </div>`;

  const parsed = new DOMParser().parseFromString(winHTML, 'text/html');
  document.getElementById('app').append(...parsed.body.childNodes);

  const win = document.querySelector('.win');
  const panels = Array.from(document.querySelectorAll('.step'));
  const dotEls = Array.from(document.querySelectorAll('.wizdots i'));
  const backBtn = document.getElementById('backBtn');
  const nextBtn = document.getElementById('nextBtn');
  const skipBtn = document.getElementById('skipBtn');
  const N = STEPS.length;
  let cur = 0;

  function render() {
    panels.forEach((el,i) => el.classList.toggle('show', i === cur));
    dotEls.forEach((el,i) => el.classList.toggle('on', i === cur));
    backBtn.hidden = cur === 0;
    skipBtn.hidden = cur === N - 1;
    nextBtn.textContent = cur === 0 ? 'Get started' : cur === N - 1 ? 'Open Settings' : 'Next';
  }
  backBtn.addEventListener('click', () => { if (cur > 0) { cur--; render(); } });
  nextBtn.addEventListener('click', () => { if (cur < N - 1) { cur++; render(); } });
  skipBtn.addEventListener('click', () => { cur = N - 1; render(); });
  render();

  const themeBtn = document.getElementById('themeBtn');
  themeBtn.addEventListener('click', () => {
    const dark = win.classList.toggle('theme-dark');
    win.classList.toggle('theme-light', !dark);
    const svg = new DOMParser().parseFromString(dark ? ic.sun : ic.moon, 'image/svg+xml');
    themeBtn.replaceChildren(svg.documentElement);
  });
</script>
</body>
</html>
