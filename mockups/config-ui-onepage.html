<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wind Config - single page + scroll-spy rail</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; padding: 36px; background: #232328; color: #e9e9ee;
         font-family: "Segoe UI Variable","Segoe UI",system-ui,sans-serif; display: flex;
         flex-direction: column; align-items: center; }
  h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; align-self: flex-start; }
  .sub { color: #b9b9c4; margin: 0 0 22px; font-size: 12.5px; align-self: flex-start; max-width: 700px; line-height: 1.5; }

  /* ---------------- theme tokens ---------------- */
  .theme-dark {
    --rail:#17171b; --bg:#0e0e12; --panel-line:rgba(255,255,255,.06);
    --text:#f3f3f6; --muted:#85858f; --line:#1f1f25; --hover:rgba(255,255,255,.07);
    --accent:#5b5bd6; --accent-icon:#9090f2; --accent-soft:rgba(91,91,214,.22);
    --track:rgba(255,255,255,.16); --winborder:rgba(255,255,255,.08); --shadow:0 24px 64px rgba(0,0,0,.7);
    --chip:rgba(255,255,255,.06);
  }
  .theme-light {
    --rail:#e9e9ee; --bg:#ffffff; --panel-line:rgba(0,0,0,.08);
    --text:#1c1c22; --muted:#6c6c77; --line:#ededf1; --hover:rgba(0,0,0,.05);
    --accent:#5b5bd6; --accent-icon:#5b5bd6; --accent-soft:rgba(91,91,214,.13);
    --track:rgba(0,0,0,.14); --winborder:rgba(0,0,0,.1); --shadow:0 24px 64px rgba(0,0,0,.2);
    --chip:rgba(0,0,0,.04);
  }

  /* ---------------- window ---------------- */
  .win { width: 660px; height: 588px; border-radius: 12px; overflow: hidden; display: flex;
         background: var(--bg); color: var(--text); border: 1px solid var(--winborder);
         box-shadow: var(--shadow); font-size: 13px; }

  /* rail */
  .rail { width: 64px; flex-shrink: 0; background: var(--rail); display: flex; flex-direction: column;
          align-items: center; padding: 12px 0 14px; border-right: 1px solid var(--panel-line); }
  .rail-glyph { width: 40px; height: 40px; display: grid; place-items: center; color: var(--accent-icon); margin-bottom: 10px; }
  .rail-nav { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .ritem { width: 42px; height: 42px; border-radius: 10px; display: grid; place-items: center;
           color: var(--muted); cursor: pointer; position: relative; border: 0; background: transparent; }
  .ritem:hover { background: var(--hover); color: var(--text); }
  .ritem.active { background: var(--accent-soft); color: var(--accent-icon); }
  .ritem.active::before { content: ''; position: absolute; left: -12px; top: 11px; bottom: 11px;
                          width: 3px; border-radius: 2px; background: var(--accent); }
  .rail-spacer { flex: 1; }
  .rail-foot { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--hover); color: var(--muted);
            display: grid; place-items: center; }

  /* main */
  .main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .caption { height: 44px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding-left: 22px; }
  .ctitle { font-size: 12.5px; color: var(--muted); font-weight: 500; }
  .tbtns { display: flex; height: 100%; }
  .tbtn { width: 46px; height: 100%; display: grid; place-items: center; color: var(--muted); border: 0; background: transparent; cursor: pointer; }
  .tbtn:hover { background: var(--hover); color: var(--text); }
  .tbtn.close:hover { background: #e81123; color: #fff; }

  .scroll { flex: 1; overflow-y: auto; position: relative; padding: 0 30px 22px; scroll-behavior: smooth; }
  .sec { padding-top: 6px; }
  .sec-head { position: sticky; top: 0; background: var(--bg); z-index: 2; padding: 16px 0 9px; }
  .sec-head h2 { margin: 0 0 4px; font-size: 24px; font-weight: 600; letter-spacing: -.2px; }
  .sec-head p { margin: 0; color: var(--muted); font-size: 13px; }

  .row { display: flex; align-items: center; gap: 18px; padding: 13px 2px; border-bottom: 1px solid var(--line); }
  .sec:last-child .row:last-child { border-bottom: 0; }
  .rtext { flex: 1; min-width: 0; }
  .rlabel { font-size: 13.5px; }
  .rdesc { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
  .rctl { flex-shrink: 0; display: flex; align-items: center; gap: 10px; }

  .slider { display: flex; align-items: center; gap: 12px; width: 190px; }
  .track { position: relative; flex: 1; height: 4px; border-radius: 3px; background: var(--track); }
  .fill { position: absolute; left: 0; top: 0; height: 100%; border-radius: 3px; background: var(--accent); }
  .knob { position: absolute; top: 50%; width: 13px; height: 13px; border-radius: 50%; background: #fff;
          transform: translate(-50%,-50%); box-shadow: 0 1px 3px rgba(0,0,0,.45); }
  .val { width: 40px; text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; font-size: 12px; }

  .toggle { width: 38px; height: 21px; border-radius: 11px; border: 0; background: var(--track); position: relative; cursor: pointer; padding: 0; }
  .toggle .dot { position: absolute; top: 2px; left: 2px; width: 17px; height: 17px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,.4); }
  .toggle.on { background: var(--accent); }
  .toggle.on .dot { left: 19px; }

  .keycap { padding: 4px 10px; border-radius: 6px; border: 1px solid var(--line); background: var(--chip);
            font-size: 11.5px; color: var(--text); }
  .select { display: flex; align-items: center; gap: 8px; padding: 5px 11px; border-radius: 7px;
            border: 1px solid var(--line); background: transparent; font-size: 12.5px; color: var(--text); cursor: pointer; }
  .linkbtn { padding: 6px 13px; border-radius: 7px; border: 1px solid var(--line); background: transparent;
             font-size: 12px; color: var(--text); cursor: pointer; }

  .acard { display: flex; align-items: center; gap: 14px; padding: 15px; border: 1px solid var(--line);
           border-radius: 10px; margin: 6px 0 4px; }
  .acard .ava { width: 38px; height: 38px; border-radius: 50%; background: var(--accent-soft); color: var(--accent-icon);
                display: grid; place-items: center; flex-shrink: 0; }
  .acard .at { flex: 1; }
  .acard .at b { font-size: 13.5px; } .acard .at div { color: var(--muted); font-size: 11.5px; margin-top: 2px; }
  .abouthead { display: flex; align-items: center; gap: 12px; padding: 4px 0 8px; }
  .abouthead .g { color: var(--accent-icon); } .abouthead b { font-size: 15px; }
  .abouthead span { color: var(--muted); font-size: 12px; }

  .footer { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 12px 26px; border-top: 1px solid var(--line); }
  .fhint { margin-right: auto; color: var(--muted); font-size: 11.5px; }
  .btn { padding: 7px 16px; border-radius: 7px; border: 1px solid var(--line); background: transparent; color: var(--text); font-size: 12.5px; cursor: pointer; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
</style>
</head>
<body>
  <h1>Wind Config &mdash; single scrolling page, scroll-spy rail</h1>
  <p class="sub">Every section lives on one page. Click a rail icon to jump to that section; the active
  icon updates automatically as you scroll. Hover icons for tooltips. Toggle dark/light with the
  sun/moon at the bottom of the rail. (Interactive mock.)</p>

  <div id="app"></div>

<script>
  const ic = {
    zoom:   '<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="7" r="4.3"/><path d="M10.2 10.2 14 14"/></svg>',
    cursor: '<svg viewBox="0 0 16 16" width="18" height="18" fill="currentColor"><path d="M3 2.2 12.4 7l-3.9 1.2L11 13.2 9.2 14 6.7 8.9 3 11.7z"/></svg>',
    display:'<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2.8" width="12" height="8" rx="1.2"/><path d="M6 13.5h4M8 10.8v2.7"/></svg>',
    adv:    '<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4.3h12M2 8h12M2 11.7h12"/><circle cx="6" cy="4.3" r="1.7"/><circle cx="10.5" cy="8" r="1.7"/><circle cx="5" cy="11.7" r="1.7"/></svg>',
    about:  '<svg viewBox="0 0 16 16" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 7.3v3.4"/><path d="M8 5.1v.1"/></svg>',
    glyph:  '<svg viewBox="0 0 16 16" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2 5.5h8.5a2 2 0 1 0-2-2"/><path d="M2 9h11a2 2 0 1 1-2 2"/><path d="M2 12.5h6.5a1.7 1.7 0 1 1-1.7 1.7"/></svg>',
    cog:    '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3"><circle cx="8" cy="8" r="2.2"/><path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4"/></svg>',
    person: '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="8" cy="5.4" r="2.6"/><path d="M3.4 13.4a4.6 4.6 0 0 1 9.2 0"/></svg>',
    sun:    '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="3"/><path d="M8 1v1.6M8 13.4V15M1 8h1.6M13.4 8H15M3.05 3.05l1.1 1.1M11.85 11.85l1.1 1.1M12.95 3.05l-1.1 1.1M4.15 11.85l-1.1 1.1"/></svg>',
    moon:   '<svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M13.5 9.5A5.5 5.5 0 1 1 6.5 2.5a4.3 4.3 0 0 0 7 7z"/></svg>',
    min:    '<svg viewBox="0 0 11 11" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M1 5.5h9"/></svg>',
    close:  '<svg viewBox="0 0 11 11" width="11" height="11" fill="none" stroke="currentColor" stroke-width="1.1"><path d="M1.3 1.3 9.7 9.7M9.7 1.3 1.3 9.7"/></svg>',
    gh:     '<svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor"><path d="M8 .5a7.5 7.5 0 0 0-2.37 14.62c.37.07.5-.16.5-.36v-1.3c-2.04.44-2.47-.98-2.47-.98-.34-.85-.82-1.08-.82-1.08-.67-.46.05-.45.05-.45.74.05 1.13.76 1.13.76.66 1.13 1.73.8 2.15.61.07-.48.26-.8.47-.99-1.63-.18-3.34-.81-3.34-3.62 0-.8.28-1.45.76-1.96-.08-.19-.33-.94.07-1.96 0 0 .62-.2 2.03.75a7 7 0 0 1 3.7 0c1.4-.95 2.02-.75 2.02-.75.4 1.02.15 1.77.07 1.96.48.51.76 1.16.76 1.96 0 2.82-1.72 3.44-3.36 3.62.27.23.5.68.5 1.37v2.03c0 .2.13.43.5.36A7.5 7.5 0 0 0 8 .5z"/></svg>',
  };

  const slider = (pct,val) => `<div class="slider"><div class="track"><div class="fill" style="width:${pct}%"></div><div class="knob" style="left:${pct}%"></div></div><span class="val">${val}</span></div>`;
  const toggle = (on) => `<button class="toggle${on?' on':''}" type="button"><span class="dot"></span></button>`;
  const keycap = (t) => `<span class="keycap">${t}</span>`;
  const select = (t) => `<button class="select">${t}<svg viewBox="0 0 10 6" width="9" height="6" fill="none" stroke="currentColor" stroke-width="1.3"><path d="M1 1l4 4 4-4"/></svg></button>`;
  const linkbtn = (t) => `<button class="linkbtn">${t}</button>`;
  const row = (label,desc,ctl) => `<div class="row"><div class="rtext"><div class="rlabel">${label}</div><div class="rdesc">${desc}</div></div><div class="rctl">${ctl}</div></div>`;

  const SECTIONS = [
    { id:'zoom', icon:'zoom', label:'Zoom', desc:'How magnification grows while you hold the zoom button.', body:
      row('Zoom in', 'Hold this to zoom in', keycap('Mouse button 5')) +
      row('Zoom out', 'Hold this to zoom out', keycap('Mouse button 4')) +
      row('Zoom-in speed', 'How fast it zooms in', slider(58,'2.0&times;')) +
      row('Zoom-out speed', 'Speed when zooming back out', slider(58,'2.0&times;')) +
      row('Smooth zoom', 'Eases up to your speed instead of snapping', toggle(true)) +
      row('Ease-in depth', 'Higher = gentler start', slider(52,'5.0')) +
      row('Smooth ramp', 'Seconds to reach full speed', slider(13,'0.4s')) +
      row('Max zoom', 'How far in you can go', slider(82,'20&times;')) },
    { id:'cursor', icon:'cursor', label:'Cursor', desc:'Pointer movement and visibility while zoomed.', body:
      row('Cursor speed', 'Pan speed multiplier (1.0 = match your mouse)', slider(25,'1.0&times;')) +
      row('Pan smoothing', '0 = off, higher = smoother', slider(42,'0.4')) +
      row('Scale cursor with zoom', 'Grow the cursor as you zoom in', toggle(true)) +
      row('Cursor visibility', 'When to draw the magnified cursor', select('Always')) },
    { id:'display', icon:'display', label:'Display', desc:'Image quality of the magnified view.', body:
      row('Smooth scaling', 'Bilinear vs crisp pixels', toggle(true)) +
      row('Sharpness', 'Crisps the magnified image (0 = off)', slider(50,'0.5')) +
      row('Brightness', 'Output multiplier', slider(50,'1.0&times;')) +
      row('HDR tonemap', 'HDR10 to SDR when HDR is on', toggle(true)) +
      row('Follow cursor monitor', 'Magnify whichever monitor the cursor is on', toggle(true)) },
    { id:'adv', icon:'adv', label:'Advanced', desc:'Pacing and diagnostics. Defaults are usually best.', body:
      row('VSync', 'Lock presentation to the display refresh', toggle(true)) +
      row('DWM-flush pacing', 'Align frames to the compositor', toggle(false)) +
      row('Crop capture on full repaints', 'Cheaper capture in games', toggle(true)) +
      row('Frametime logging', 'Write timing to a log file', toggle(false)) +
      row('Config file', 'Open magnifier.ini in your editor', linkbtn('Edit config file')) },
    { id:'about', icon:'about', label:'About', desc:'', body:
      `<div class="abouthead"><span class="g">${ic.glyph}</span><b>Wind</b><span>version 0.9.0</span></div>` +
      row('Source &amp; updates', 'View the project on GitHub', linkbtn(ic.gh + ' &nbsp;GitHub')) +
      `<div class="acard"><div class="ava">${ic.person}</div><div class="at"><b>Account</b><div>Sign in &amp; licensing &mdash; coming soon</div></div><button class="btn">Sign in</button></div>` },
  ];

  const railNav = SECTIONS.map(s =>
    `<button class="ritem" data-target="${s.id}" title="${s.label}">${ic[s.icon]}</button>`).join('');
  const scrollBody = SECTIONS.map(s =>
    `<div class="sec" id="sec-${s.id}"><div class="sec-head"><h2>${s.label}</h2>${s.desc?`<p>${s.desc}</p>`:''}</div>${s.body}</div>`).join('');

  const winHTML = `<div class="win theme-dark">
    <aside class="rail">
      <div class="rail-glyph" title="Wind">${ic.glyph}</div>
      <div class="rail-nav">${railNav}</div>
      <div class="rail-spacer"></div>
      <div class="rail-foot">
        <button class="ritem" id="themeBtn" title="Toggle theme">${ic.sun}</button>
        <button class="ritem" title="Edit config file">${ic.cog}</button>
        <div class="avatar" title="Account (coming soon)">${ic.person}</div>
      </div>
    </aside>
    <section class="main">
      <div class="caption"><span class="ctitle">Wind Settings</span>
        <div class="tbtns"><button class="tbtn" title="Minimize">${ic.min}</button>
          <button class="tbtn close" title="Close">${ic.close}</button></div></div>
      <div class="scroll" id="scroll">${scrollBody}</div>
      <div class="footer"><span class="fhint">All changes saved</span>
        <button class="btn">Discard</button><button class="btn primary">Apply</button></div>
    </section>
  </div>`;

  // Static literal markup parsed via DOMParser (safe DOM method, no innerHTML sink).
  const parsed = new DOMParser().parseFromString(winHTML, 'text/html');
  document.getElementById('app').append(...parsed.body.childNodes);

  const win = document.querySelector('.win');
  const scroll = document.getElementById('scroll');
  const items = Array.from(document.querySelectorAll('.ritem[data-target]'));
  const secs = SECTIONS.map(s => document.getElementById('sec-' + s.id));

  function setActive(id) {
    items.forEach(it => it.classList.toggle('active', it.dataset.target === id));
  }
  // Click a rail icon -> scroll its section to the top of the scroll area.
  items.forEach(it => it.addEventListener('click', () => {
    const el = document.getElementById('sec-' + it.dataset.target);
    scroll.scrollTo({ top: el.offsetTop - 4, behavior: 'smooth' });
  }));
  // Scroll-spy: the active section is the last one whose header has reached the top band.
  function onScroll() {
    let cur = SECTIONS[0].id;
    for (const s of secs) { if (s.offsetTop - scroll.scrollTop <= 70) cur = s.id.slice(4); }
    setActive(cur);
  }
  scroll.addEventListener('scroll', onScroll);
  setActive('zoom');

  // Theme toggle (sun/moon).
  const themeBtn = document.getElementById('themeBtn');
  themeBtn.addEventListener('click', () => {
    const dark = win.classList.toggle('theme-dark');
    win.classList.toggle('theme-light', !dark);
    const parsedIcon = new DOMParser().parseFromString(dark ? ic.sun : ic.moon, 'image/svg+xml');
    themeBtn.replaceChildren(parsedIcon.documentElement);
  });
</script>
</body>
</html>
